services:
  - type: web
    name: interq-server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
